<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>화학식량 계산기</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f5;color:#222}
.pt-wrap{padding:8px 12px;max-width:100%;height:100vh;display:flex;flex-direction:column;overflow:hidden}
.pt-title{font-size:16px;font-weight:600;color:#222;margin-bottom:2px;text-align:center;flex-shrink:0}
.pt-subtitle{font-size:13px;font-weight:600;color:#374151;text-align:center;margin-bottom:8px;flex-shrink:0}
.controls{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:8px;align-items:center;justify-content:center;flex-shrink:0}
.filter-btn{font-size:11px;padding:4px 12px;border:1.5px solid rgba(0,0,0,0.15);border-radius:20px;background:#fff;color:#444;cursor:pointer;transition:all 0.15s;font-weight:500;display:flex;align-items:center;gap:5px}
.filter-btn:hover{border-color:rgba(0,0,0,0.3);filter:brightness(0.95)}
.filter-btn.active{border-color:rgba(0,0,0,0.35);filter:brightness(0.88);font-weight:600;color:#222}
.filter-btn .dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;border:1px solid rgba(0,0,0,0.15)}

/* 주기율표 — flex-shrink:0, 높이는 JS가 결정 */
.table-scroll{overflow:visible;display:flex;justify-content:center;flex-shrink:0}
.pt-grid{display:inline-grid;gap:2px}
.period-label{display:flex;align-items:center;justify-content:center;font-size:10px;color:#888;font-weight:500}
.group-label{display:flex;align-items:center;justify-content:center;font-size:9px;color:#aaa;padding-bottom:2px}
.el-cell{border-radius:4px;border:1px solid rgba(0,0,0,0.15);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;overflow:hidden;will-change:transform;transition:box-shadow 0.1s}
.el-cell:hover{box-shadow:0 2px 6px rgba(0,0,0,0.22);filter:brightness(0.93);z-index:10}
.el-cell.selected{outline:2.5px solid #0891b2;outline-offset:1px;z-index:10}
.el-cell.dimmed{opacity:0.15}
.el-num{line-height:1;color:rgba(0,0,0,0.5)}
.el-sym{font-weight:600;line-height:1.1;color:rgba(0,0,0,0.85)}
.el-name{line-height:1;color:rgba(0,0,0,0.55);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;width:100%;text-align:center}
.placeholder{border-radius:4px;border:1px dashed #bbb;display:flex;align-items:center;justify-content:center;color:#aaa;cursor:default}
.empty{background:transparent;border:none}

/* 시리즈 행 */
.series-section{margin-top:4px;display:flex;justify-content:center;flex-shrink:0}
.series-inner{display:flex;flex-direction:column;gap:3px}
.series-title{font-size:11px;color:#666;font-weight:500;white-space:nowrap;margin-bottom:2px}
.series-row{display:flex;gap:2px}

/* Count popup + formula bar — 같은 줄, 같은 높이 */
/* 화학식 바 + 결과창 공통 중앙 컨테이너 */
.center-col{display:flex;flex-direction:column;align-items:center;flex-shrink:0}
/* Count popup + formula bar */
.bottom-bar{width:500px;max-width:90vw;margin:4px 0;flex-shrink:0;position:relative}
.formula-bar-wrap{position:relative;width:100%}
.cnt-popup{display:none;position:absolute;bottom:calc(100% + 6px);left:50%;transform:translateX(-50%);background:#fff;border:1px solid #d1d5db;border-radius:10px;padding:7px 12px;box-shadow:0 4px 12px rgba(0,0,0,.12);align-items:center;gap:6px;white-space:nowrap;z-index:50}
.cnt-popup.open{display:flex}
.cnt-popup::after{content:'';position:absolute;top:100%;left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#d1d5db}
.cnt-popup::before{content:'';position:absolute;top:calc(100% - 1px);left:50%;transform:translateX(-50%);border:6px solid transparent;border-top-color:#fff;z-index:1}
.cnt-title{font-size:11px;font-weight:600;color:#111;white-space:nowrap}
.cnt-btns{display:flex;gap:4px;flex-wrap:nowrap}
.cnt-btn{border:1px solid #d1d5db;border-radius:6px;font-size:12px;cursor:pointer;background:#f9fafb;color:#111;transition:background .12s;display:flex;align-items:center;justify-content:center}
.cnt-btn:hover{background:#e0f2fe}
.radio-badge{font-size:10px;background:#fef3c7;color:#92400e;padding:1px 5px;border-radius:3px;margin-left:2px}

/* Formula bar */
.formula-bar{background:#fff;border:1px solid #d1d5db;border-radius:10px;padding:7px 12px;display:flex;align-items:center;gap:8px;box-shadow:0 1px 4px rgba(0,0,0,.06);width:100%}
.formula-display{font-family:'Courier New',monospace;font-size:16px;font-weight:600;color:#111;flex:1;min-width:60px;word-break:break-all}
.formula-placeholder{font-size:12px;color:#9ca3af;flex:1}
.btn-icon{padding:5px 10px;border:1px solid #d1d5db;border-radius:7px;font-size:12px;cursor:pointer;background:#f9fafb;color:#374151;transition:background .12s}
.btn-icon:hover{background:#f3f4f6}
.btn-calc{padding:5px 16px;border:none;border-radius:7px;font-size:13px;font-weight:600;cursor:pointer;background:#0891b2;color:#fff;transition:background .12s;align-self:stretch}
.btn-calc:hover{background:#0e7490}

/* Result — 항상 보이는 고정 영역 */
.result-wrap{flex-shrink:0;height:180px;overflow-y:auto;width:500px;max-width:90vw;padding-top:4px}
.result-card{background:#fff;border:1px solid #e5e7eb;border-radius:12px;padding:10px 20px;width:100%;box-sizing:border-box}
.formula-header{font-size:13px;color:#374151;margin-bottom:8px;padding-bottom:6px;border-bottom:1px solid #e5e7eb;font-weight:500}
.formula-header span{font-weight:700;color:#111;font-family:'Courier New',monospace}
.result-row{display:grid;grid-template-columns:1fr auto auto;gap:8px;align-items:center;padding:6px 0;border-bottom:1px solid #f0f0f0}
.r-sym{font-size:15px;font-weight:700;color:#111;font-family:'Courier New',monospace}
.r-name{font-size:12px;color:#555;margin-left:2px}
.r-math{font-size:13px;color:#444;text-align:right;white-space:nowrap}
.r-sub{font-size:14px;font-weight:700;color:#111;text-align:right;white-space:nowrap}
.result-total{display:flex;justify-content:space-between;align-items:baseline;padding:10px 0 0}
.r-total-label{font-size:14px;font-weight:600;color:#374151}
.r-total-val{font-size:26px;font-weight:700;color:#0891b2}
.r-unit{font-size:13px;color:#555;margin-left:4px}
.radio-note{font-size:11px;color:#b45309;margin-top:6px}
.iupac-note{font-size:11px;color:#9ca3af;margin-top:4px}
.hint{margin-top:4px;text-align:center;font-size:11px;color:#aaa;flex-shrink:0}
</style>
</head>
<body>
<div class="pt-wrap">
  <div class="pt-title">화학식량 계산기</div>
  <div class="pt-subtitle">원소 클릭 → 개수 선택 → 계산</div>
  <div class="controls">
    <button class="filter-btn active" data-cat="all" style="background:#f0f0f0">전체</button>
    <button class="filter-btn" data-cat="metal" style="background:#85B7EB"><span class="dot" style="background:#378ADD"></span>금속</button>
    <button class="filter-btn" data-cat="metalloid" style="background:#C0DD97"><span class="dot" style="background:#639922"></span>준금속</button>
    <button class="filter-btn" data-cat="nonmetal" style="background:#FAC775"><span class="dot" style="background:#BA7517"></span>비금속</button>
  </div>

  <!-- 주기율표 중앙 정렬 -->
  <div class="table-scroll">
    <div id="pt-grid" class="pt-grid"></div>
  </div>

  <!-- 란타넘족 / 악티늄족 — JS로 중앙 정렬 offset 계산 후 주입 -->
  <div class="series-section" id="series-lant">
    <div class="series-inner" id="series-lant-inner"></div>
  </div>
  <div class="series-section" id="series-act">
    <div class="series-inner" id="series-act-inner"></div>
  </div>

  <div class="center-col">
    <div class="bottom-bar">
      <div class="formula-bar-wrap">
        <div class="cnt-popup" id="cntPopup">
          <div class="cnt-title" id="cntTitle"></div>
          <div class="cnt-btns" id="cntBtns"></div>
        </div>
        <div class="formula-bar">
          <span class="formula-placeholder" id="formulaDisplay">원소를 클릭해 화학식을 만들어 보세요</span>
          <button class="btn-icon" onclick="backspace()" title="마지막 원소 삭제">← 삭제</button>
          <button class="btn-icon" onclick="clearFormula()">초기화</button>
          <button class="btn-calc" onclick="calculate()">계산</button>
        </div>
      </div>
    </div>
    <div class="result-wrap">
      <div id="resultArea" style="display:none"></div>
    </div>
  </div>

</div>

const CAT_COLORS = {metal:"#85B7EB", metalloid:"#C0DD97", nonmetal:"#FAC775"};
let activeFilter = 'all';
let formula = [];
let cellSize = 36; // 전역으로 저장해 시리즈 정렬에 재사용

function makeCellSize() {
  const wrap = document.querySelector('.pt-wrap');
  const w = wrap.offsetWidth || 360;

  const vh = window.innerHeight;
  const fixedH = 16 + 18 + 14 + 50 + 20 + 30; // 타이틀+부제+필터+formulabar+hint+여백
  const seriesTitleH = 28;
  const seriesGapH = 12;
  const resultH = 184; // 결과창 고정 높이
  const availH = vh - fixedH - seriesTitleH - seriesGapH - resultH;
  const sizeByH = Math.floor((availH - 10 * 2) / 11);

  const availW = w - 24 - 40;
  const sizeByW = Math.floor(availW / 18);

  return Math.max(20, Math.min(52, Math.min(sizeByH, sizeByW)));
}

function getColor(el) { return CAT_COLORS[el.cat] || '#ccc'; }

function renderCell(el, size) {
  const d = document.createElement('div');
  if (!el) { d.className = 'empty'; d.style.cssText = `width:${size}px;height:${size}px`; return d; }
  d.className = 'el-cell';
  d.id = 'cell-' + el.sym;
  d.style.cssText = `width:${size}px;height:${size}px;background:${getColor(el)}`;
  const fs1 = Math.max(7,  Math.floor(size * 0.17));
  const fs2 = Math.max(9,  Math.floor(size * 0.26));
  const fs3 = Math.max(6,  Math.floor(size * 0.14));
  d.innerHTML =
    `<span class="el-num"  style="font-size:${fs1}px">${el.num}</span>` +
    `<span class="el-sym"  style="font-size:${fs2}px">${el.sym}</span>` +
    `<span class="el-name" style="font-size:${fs3}px;padding:0 1px">${el.name}</span>`;
  if (activeFilter !== 'all' && el.cat !== activeFilter) d.classList.add('dimmed');
  d.addEventListener('click', () => openPopup(el.sym));
  return d;
}

function renderGrid() {
  cellSize = makeCellSize();
  const size = cellSize;
  const gap = 2;
  const cellStep = size + gap;

  const grid = document.getElementById('pt-grid');
  grid.style.gridTemplateColumns = `40px repeat(18,${size}px)`;
  grid.innerHTML = '';

  // 그룹 헤더
  grid.appendChild(Object.assign(document.createElement('div'), {className:'group-label'}));
  for (let g = 1; g <= 18; g++) {
    const lbl = document.createElement('div');
    lbl.className = 'group-label';
    lbl.style.cssText = `width:${size}px;font-size:9px`;
    lbl.textContent = g;
    grid.appendChild(lbl);
  }

  // 주기 행
  for (let p = 1; p <= 7; p++) {
    const pl = document.createElement('div');
    pl.className = 'period-label';
    pl.style.cssText = `width:40px;height:${size}px`;
    pl.textContent = p;
    grid.appendChild(pl);

    for (let g = 1; g <= 18; g++) {
      if ((p === 6 || p === 7) && g === 3) {
        const ph = document.createElement('div');
        ph.className = 'placeholder';
        ph.style.cssText = `width:${size}px;height:${size}px;font-size:${Math.max(7, size*0.15)}px`;
        ph.textContent = p === 6 ? '57-71' : '89-118';
        grid.appendChild(ph);
        continue;
      }
      const el = ELEMENTS.find(e => e.period === p && e.group === g && !e.series);
      grid.appendChild(renderCell(el || null, size));
    }
  }

  // ── 주기율표 전체 너비 계산 ──
  // 전체 그리드 너비 = 40(period label) + gap + 18*(size+gap) - gap
  const gridTotalWidth = 40 + gap + 18 * cellStep - gap;

  // 시리즈 행은 group 3(index 2)부터 시작 → 왼쪽 오프셋
  // period label(40) + gap + 2개 셀(group1,group2) = 40 + gap + 2*cellStep
  const seriesStartX = 40 + gap + 2 * cellStep;

  // 란타넘족: 57~71 = 15개 셀, 악티늄족 행1: 89~103 = 15개, 행2: 104~118 = 15개
  // 15개 셀 너비 = 15*size + 14*gap
  const seriesWidth = 15 * size + 14 * gap;

  // 시리즈 inner div 너비를 주기율표 전체와 동일하게 하고,
  // 셀 행에 padding-left 로 group3 위치를 맞춤
  renderSeries(
    'series-lant-inner',
    '란타넘족 (57–71)',
    57, 71, null,
    gridTotalWidth, seriesStartX, size, gap
  );
  renderActinide(
    'series-act-inner',
    gridTotalWidth, seriesStartX, size, gap
  );

  // 현재 선택 상태 복원
  formula.forEach(f => {
    const cell = document.getElementById('cell-' + f.sym);
    if (cell) cell.classList.add('selected');
  });
}

function renderSeries(innerId, title, from, to, _, totalW, startX, size, gap) {
  const inner = document.getElementById(innerId);
  inner.innerHTML = '';
  inner.style.width = totalW + 'px';

  const titleEl = document.createElement('div');
  titleEl.className = 'series-title';
  titleEl.style.cssText = `padding-left:${startX}px;margin-bottom:3px`;
  titleEl.textContent = title;
  inner.appendChild(titleEl);

  const row = document.createElement('div');
  row.className = 'series-row';
  row.style.paddingLeft = startX + 'px';

  for (let n = from; n <= to; n++) {
    const el = ELEMENTS.find(e => e.num === n);
    if (el) row.appendChild(renderCell(el, size));
  }
  inner.appendChild(row);
}

function renderActinide(innerId, totalW, startX, size, gap) {
  const inner = document.getElementById(innerId);
  inner.innerHTML = '';
  inner.style.width = totalW + 'px';

  const titleEl = document.createElement('div');
  titleEl.className = 'series-title';
  titleEl.style.cssText = `padding-left:${startX}px;margin-bottom:3px`;
  titleEl.textContent = '악티늄족 (89–118)';
  inner.appendChild(titleEl);

  // 행1: 89~103
  const row1 = document.createElement('div');
  row1.className = 'series-row';
  row1.style.paddingLeft = startX + 'px';
  for (let n = 89; n <= 103; n++) {
    const el = ELEMENTS.find(e => e.num === n);
    if (el) row1.appendChild(renderCell(el, size));
  }
  inner.appendChild(row1);

  // 행2: 104~118
  const row2 = document.createElement('div');
  row2.className = 'series-row';
  row2.style.cssText = `padding-left:${startX}px;margin-top:2px`;
  for (let n = 104; n <= 118; n++) {
    const el = ELEMENTS.find(e => e.num === n);
    if (el) row2.appendChild(renderCell(el, size));
  }
  inner.appendChild(row2);
}

function openPopup(sym) {
  const el = ELEMENTS.find(e => e.sym === sym);
  const s = cellSize; // 현재 셀 크기와 동일하게
  document.getElementById('cntTitle').innerHTML =
    `<span style="font-family:'Courier New',monospace;font-size:${Math.max(11,s*0.28)}px;font-weight:700">${el.sym}</span> ` +
    `<span style="font-size:${Math.max(9,s*0.22)}px;color:#6b7280">${el.name} · 원자량 ${el.mass}</span>` +
    (el.radio ? ' <span class="radio-badge">방사성</span>' : '') +
    ` — 개수 선택`;
  const btns = document.getElementById('cntBtns');
  btns.innerHTML = '';
  for (let n = 1; n <= 10; n++) {
    const b = document.createElement('button');
    b.className = 'cnt-btn';
    b.textContent = n;
    b.style.cssText = `width:${s}px;height:${s}px;font-size:${Math.max(10,s*0.3)}px`;
    b.onclick = () => addElement(sym, n);
    btns.appendChild(b);
  }
  const popup = document.getElementById('cntPopup');
  popup.classList.add('open');
}

function addElement(sym, cnt) {
  const existing = formula.find(f => f.sym === sym);
  if (existing) existing.cnt += cnt;
  else formula.push({ sym, cnt });
  document.getElementById('cntPopup').classList.remove('open');
  updateDisplay();
  updateSelectedCells();
  document.getElementById('resultArea').style.display = 'none';
}

function updateSelectedCells() {
  document.querySelectorAll('.el-cell.selected').forEach(c => c.classList.remove('selected'));
  formula.forEach(f => {
    const cell = document.getElementById('cell-' + f.sym);
    if (cell) cell.classList.add('selected');
  });
}

function updateDisplay() {
  const d = document.getElementById('formulaDisplay');
  if (!formula.length) {
    d.className = 'formula-placeholder';
    d.textContent = '원소를 클릭해 화학식을 만들어 보세요';
  } else {
    d.className = 'formula-display';
    d.textContent = formula.map(f => f.cnt === 1 ? f.sym : f.sym + f.cnt).join('');
  }
}

function backspace() {
  if (!formula.length) return;
  formula.pop();
  updateDisplay();
  updateSelectedCells();
  document.getElementById('resultArea').style.display = 'none';
}

function clearFormula() {
  formula = [];
  document.getElementById('cntPopup').classList.remove('open');
  updateDisplay();
  updateSelectedCells();
  document.getElementById('resultArea').style.display = 'none';
}

function formatMass(v) { return parseFloat(v.toFixed(9)).toString(); }

function calculate() {
  if (!formula.length) return;
  let total = 0, hasRadio = false, rows = '';
  formula.forEach(({ sym, cnt }) => {
    const el = ELEMENTS.find(e => e.sym === sym);
    const sub = el.mass * cnt;
    total += sub;
    if (el.radio) hasRadio = true;
    const rb = el.radio ? '<span class="radio-badge">방사성</span>' : '';
    rows += `<div class="result-row">
      <div><span class="r-sym">${sym}</span> <span class="r-name">${el.name}</span>${rb}</div>
      <span class="r-math">${el.mass} × ${cnt}</span>
      <span class="r-sub">${formatMass(sub)}</span>
    </div>`;
  });
  const fs = formula.map(f => f.cnt === 1 ? f.sym : f.sym + f.cnt).join('');
  const area = document.getElementById('resultArea');
  area.className = 'result-card';
  area.innerHTML = `
    <div class="formula-header">화학식: <span>${fs}</span></div>
    ${rows}
    <div class="result-total">
      <span class="r-total-label">화학식량</span>
      <span><span class="r-total-val">${formatMass(total)}</span><span class="r-unit">g/mol</span></span>
    </div>
    ${hasRadio ? '<p class="radio-note">* 방사성 원소: 가장 안정한 동위원소 질량수 사용</p>' : ''}
    <p class="iupac-note">IUPAC 2021 표준 원자량 기준</p>`;
  area.style.display = 'block';
  area.scrollIntoView({ behavior:'smooth', block:'nearest' });
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    this.classList.add('active');
    activeFilter = this.dataset.cat;
    renderGrid();
  });
});

renderGrid();
window.addEventListener('resize', () => {
  clearTimeout(window._rt);
  window._rt = setTimeout(renderGrid, 100);
});
</script>
